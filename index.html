<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="canonical" href="https://beacnpool.github.io/beacn-drep-web/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="BEACN DRep" />
  <meta property="og:title" content="BEACN DRep — Transparent Autonomous Governance on Cardano" />

  <meta property="og:image" content="https://beacnpool.github.io/beacn-drep-web/og.png" />
  <meta property="og:image:width" content="1200" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BEACN DRep — Transparent Autonomous Governance on Cardano" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="#/home" aria-label="BEACN DRep home">
        <img src="./assets/logo.png" width="38" height="38" alt="" />
        <span><strong>BEACN DRep</strong><small>Verifiable governance</small></span>
      </a>
      <div class="header-actions">
        <span class="connection-dot" id="connection-dot" title="Network status"></span>
        <button class="icon-button" id="refresh-button" type="button" aria-label="Refresh data">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6v5h-5M4 18v-5h5M6.1 9a7 7 0 0 1 11.5-2.6L20 9M4 15l2.4 2.6A7 7 0 0 0 18 15"/></svg>
        </button>
      </div>
    </header>

    <div class="refresh-track" aria-hidden="true"><span id="refresh-progress"></span></div>
    <main id="app" tabindex="-1" aria-live="polite">
      <div class="view-loading">
        <div class="skeleton hero-skeleton"></div>
        <div class="skeleton-grid"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
        <div class="skeleton card-skeleton"></div><div class="skeleton card-skeleton"></div>
      </div>
    </main>

    <nav class="tab-bar" aria-label="Primary navigation">
      <a href="#/home" data-tab="home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
        <span>Live</span>
      </a>
      <a href="#/proposals" data-tab="proposals">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14v18H5zM8 7h8M8 11h8M8 15h5"/></svg>
        <span>Proposals</span>
      </a>
      <a href="#/decides" data-tab="decides">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M5 6h14M5 6l-3 6h6zM19 6l-3 6h6zM8 21h8"/></svg>
        <span>Decides</span>
      </a>
      <a href="#/verify" data-tab="verify">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 4 7v5c0 5 3.4 8.4 8 9 4.6-.6 8-4 8-9V7zM8.5 12l2.2 2.2 4.8-5"/></svg>
        <span>Verify</span>
      </a>
    </nav>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <script src="./app.js" defer></script>
</body>
</html>
